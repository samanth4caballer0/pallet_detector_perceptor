small_reflectors: # same as node namespace
  type: reflector # type here is only informative, but should be in consonance with node in launch, i.e.: reflector_perceptor type
  enabled_by_default: true
  publish_sensor_frame_detections: false
  vizbose: true
  robot_frame: "platform"
  lidars: ["lidar_front", "lidar_back"]
  scan_type: "sensor_msgs/LaserScan" # "sensor_msgs/LaserScan" or "sick_safetyscanners/ExtendedLaserScanMsg"
  min_reflector_intensity: 250 # only used for "sensor_msgs/LaserScan"
  reflector_size: 0.04
  max_detection_range: 20
  scan_decimation: 5 # only every N-th scan is processed
  override_support_points: 0 # 0 keeps the adaptive threshold, any other value forces that exact minimum support count

big_reflectors:
  type: reflector
  enabled_by_default: true
  publish_sensor_frame_detections: false
  vizbose: true
  robot_frame: "platform"
  lidars: ["lidar_front", "lidar_back"]
  scan_type: "sensor_msgs/LaserScan" # "sensor_msgs/LaserScan" or "sick_safetyscanners/ExtendedLaserScanMsg"
  min_reflector_intensity: 250 # only used for "sensor_msgs/LaserScan"
  reflector_size: 0.06
  max_detection_range: 50
  scan_decimation: 5
  override_support_points: 0 # 0 keeps the adaptive threshold, any other value forces that exact minimum support count

columns:
  type: column
  enabled_by_default: true
  vizbose: true
  robot_frame: "platform"
  lidars: ["lidar_front", "lidar_back"]
  column_size: 0.5 # side length for square columns, diameter for cylindrical columns
  max_detection_range: 25
  scan_decimation: 5
  column_isolation_distance: 0.0 # 0 disables isolation filtering; otherwise reject columns that have other scan points within column_size/sqrt(2) + this margin
  override_support_points: 0 # 0 means automatic threshold based on column_size and range

alvars:
  type: alvar
  enabled_by_default: true # bundle processing by ar_track_alvar is enabled/disabled accordingly
  publish_sensor_frame_detections: false
  vizbose: true
  robot_frame: "platform"

beacons:
  type: tmk_uwb
  enabled_by_default: true
  publish_sensor_frame_detections: false
  vizbose: true
  robot_frame: "platform"

vertical_cylinders:
  type: vertical_cylinder
  enabled_by_default: true # useful to test with rosbags, to avoid enabling from another terminal
  publish_sensor_frame_detections: false
  vizbose: true
  robot_frame: "platform"
  source_name: "camera"
  default_diameter: 1.0
  min_cloud_points: 1000
  crop_min: [-1.3, 0.2, 0.5]
  crop_max: [1.3, 0.8, 4.0]
  voxel_size: [0.02, 0.02, 0.02]

color_in_roi:
  type: color_in_roi
  enabled_by_default: true # useful to test with rosbags, to avoid enabling from another terminal
  publish_sensor_frame_detections: false
  vizbose: true
  robot_frame: "platform"
  source_name: "camera"
  default_color: "red" # one of: red, green, blue, unknown
  red_hue_center_deg: 0
  green_hue_center_deg: 120
  blue_hue_center_deg: 240
  crop_min: [-0.1, 0.1, 0.55]
  crop_max: [0.1, 0.2, 0.75]
  min_cloud_points: 1000
  min_color_inliers_points: 100 # minimum number of ROI points that must match the requested color to consider it a detection

pallet_detector:
  type: pallet
  enabled_by_default: true # useful to test with rosbags, to avoid enabling from another terminal
  vizbose: true
  robot_frame: "base_link"
  source_name: "camera"
  min_cloud_points: 1000

  # ROI in sensor optical frame (x=right, y=down, z=forward)
  crop_min: [-1.5, 0.2, 1.0]
  crop_max: [ 1.5, 1.0, 3.5]
  voxel_size: [0.02, 0.02, 0.02]

  # Y-band crop (sensor optical frame, gravity assumption: Y=down).
  # floor_y is the Y of the floor in the camera optical frame, fixed by camera mount height.
  floor_y: 0.55

  # Euclidean clustering
  cluster_tolerance: 0.05
  cluster_min_size: 500
  cluster_max_size: 200000

  # Expected EUR/EPAL pallet dimensions (m)
  pallet_width: 0.80
  pallet_height: 0.145
  tol_width: 0.10
  tol_height: 0.08

  # Pre-projection RANSAC (estimates face normal so projection axes are correct at any yaw)
  pre_ransac_max_iter: 200
  pre_ransac_distance_thresh: 0.04
  pre_ransac_min_inliers: 80

  # Front-face template matching (Xiao et al. 2017 style)
  tpl_cell_size: 0.02   # 2D grid resolution (m/cell)
  chi_threshold: 0.40   # minimum chi score to accept a cluster as a pallet

  # EUR/EPAL end-face geometry (must match physical pallet model)
  tpl_stringer_width: 0.10
  tpl_top_deck_height: 0.04
  tpl_stringer_height: 0.06
